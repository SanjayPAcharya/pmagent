# Dev override (auto-applied by `docker compose up`). Adds hot reload, published
# ports, and dev-mode Keycloak. Data containers come from the base file via the
# selfhost-data profile (set COMPOSE_PROFILES=selfhost-data in .env).

services:
  postgres:
    ports: ["5432:5432"]

  redis:
    ports: ["6379:6379"]

  keycloak:
    # base already runs `start-dev` (dev-safe); just wire deps + publish the port.
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["8080:8080"]

  # Dev-only: local dev runs over plain HTTP (no TLS). Keycloak's master realm
  # ships with sslRequired=external, which blocks the admin console over HTTP
  # behind Docker's published port. This one-shot flips master → NONE so the
  # admin UI works locally. It is NOT in the prod overlay, so production keeps
  # strict HTTPS (terminated by Caddy). Creds come from .env (KC_ADMIN*).
  keycloak-init:
    image: quay.io/keycloak/keycloak:26.0
    network_mode: "service:keycloak"   # share KC's netns → localhost = loopback (bypasses sslRequired)
    depends_on:
      keycloak:
        condition: service_started
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - |
        kc=/opt/keycloak/bin/kcadm.sh
        until $$kc config credentials --server http://localhost:8080 --realm master \
              --user "$$KC_ADMIN" --password "$$KC_ADMIN_PASSWORD" >/dev/null 2>&1; do
          echo "keycloak-init: waiting for keycloak…"; sleep 3;
        done
        $$kc update realms/master -s sslRequired=NONE
        echo "keycloak-init: dev master realm sslRequired=NONE"

        # ── Phase 2.8.5: social IdPs (create/update from env; skip any w/o creds) ──
        upsert_idp() {
          al="$$1"; pid="$$2"; cid="$$3"; sec="$$4"
          if [ -z "$$cid" ]; then echo "keycloak-init: idp $$al skipped (no client id)"; return; fi
          if $$kc get identity-provider/instances/$$al -r agentpm >/dev/null 2>&1; then
            op=update; tgt=identity-provider/instances/$$al
          else
            op=create; tgt=identity-provider/instances
          fi
          $$kc $$op $$tgt -r agentpm -s alias=$$al -s providerId=$$pid \
            -s enabled=true -s trustEmail=true -s storeToken=false \
            -s "config.clientId=$$cid" -s "config.clientSecret=$$sec" -s "config.useJwksUrl=true" \
            && echo "keycloak-init: idp $$al $$op"
        }
        upsert_idp google    google    "$$GOOGLE_CLIENT_ID"    "$$GOOGLE_CLIENT_SECRET"
        upsert_idp microsoft microsoft "$$MICROSOFT_CLIENT_ID" "$$MICROSOFT_CLIENT_SECRET"
        upsert_idp github    github    "$$GITHUB_CLIENT_ID"    "$$GITHUB_CLIENT_SECRET"

        # Seamless first social login: disable the "Review Profile" step.
        rp=$$($$kc get "authentication/flows/first%20broker%20login/executions" -r agentpm \
              --fields id,displayName --format csv 2>/dev/null | grep -i "review profile" \
              | head -1 | cut -d, -f1 | tr -d '"\r')
        if [ -n "$$rp" ]; then
          $$kc update "authentication/flows/first%20broker%20login/executions" -r agentpm \
            -b '{"id":"'"$$rp"'","requirement":"DISABLED"}' \
            && echo "keycloak-init: first-broker-login review-profile disabled"
        fi
    environment:
      KC_ADMIN: ${KC_ADMIN}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

  api:
    build:
      target: deps            # full deps + generated Prisma client, no prod build
    command: pnpm --filter @agentpm/api dev    # tsx watch
    environment:
      NODE_ENV: development
      # Dev-only AWS credentials for Bedrock (3.8) — scoped IAM-user key from .env.
      # Prod gets credentials from the EC2 instance role instead (never keys).
      # Empty values are ignored by the SDK's credential chain.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["3001:3001"]

  web:
    build:
      target: deps
    command: pnpm --filter @agentpm/web dev    # vite dev server (host 0.0.0.0:3000)
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: agentpm
      VITE_KEYCLOAK_CLIENT: agentpm-web
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
    ports: ["3000:3000"]
